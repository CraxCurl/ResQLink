<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SignalShield</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>

<body>

<div class="bg"></div>

<div class="app">

    <div class="header">
        <div class="status">
            <span class="dot"></span>
            <span id="statusText">Protected</span>
        </div>
        <button class="gear" onclick="openSettings()">⚙</button>
    </div>

    <div class="main">
        <button class="sos" 
                ontouchstart="holdStart()" 
                ontouchend="holdEnd()">
            <span>SOS</span>
        </button>
        <p class="sub">Hold for 2 seconds</p>
    </div>

</div>

<!-- Settings Bottom Sheet -->
<div class="sheet" id="sheet">
    <div class="sheet-content">
        <h3>Emergency Contact</h3>
        <input type="tel" id="phoneInput" placeholder="Enter phone number">
        <button class="save" onclick="saveNumber()">Save</button>
        <button class="cancel" onclick="closeSettings()">Cancel</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
