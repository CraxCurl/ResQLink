<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResQLink</title>
<link rel="stylesheet" href="styles.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>
</head>

<body>

<div id="loading" class="screen active">
  <div class="logo">ResQLink</div>
  <div id="quote">Empowering Every Step.</div>
  <div class="loader"></div>
</div>

<div id="auth" class="screen">
  <h1 class="brand">ResQLink</h1>

  <div class="features">
    <div>🛡 Real-Time Safety</div>
    <div>📍 Location Tracking</div>
    <div>🚨 Emergency SOS</div>
    <div>👥 Guardian Connect</div>
  </div>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <input id="guardian" placeholder="Guardian Phone (+91...)">

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<div id="dashboard" class="screen">
  <h2>Dashboard</h2>

  <div id="connectionStatus" class="status">
    Stick Not Connected
  </div>

  <div id="locationStatus">Fetching location...</div>

  <button onclick="manualSOS()">Manual SOS</button>
</div>

<script src="app.js"></script>
</body>
</html>
