<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SignalShield</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="app">

  <!-- AUTH SCREEN -->
  <div id="authScreen" class="screen active">
    <div class="auth-card">
      <h1>SignalShield</h1>
      <p class="subtitle">Guardian Safety System</p>

      <input type="text" id="fullName" placeholder="Full Name">
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">
      <input type="tel" id="guardianPhone" placeholder="Guardian Phone Number">

      <button onclick="register()">Register</button>
      <button class="secondary" onclick="login()">Login</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="screen">
    <div class="top-bar">
      <div class="logo">SignalShield</div>
      <div class="profile" onclick="openProfile()">👤</div>
    </div>

    <div class="device-status">
      <div id="connectionLight" class="light"></div>
      <h2 id="connectionText">Stick Not Connected</h2>
    </div>

    <button class="connect-btn" onclick="connectESP32()">Connect Stick</button>

  </div>

  <!-- PROFILE SCREEN -->
  <div id="profileScreen" class="screen">
    <div class="profile-card">
      <h2>Profile</h2>
      <p id="profileName"></p>
      <p id="profileEmail"></p>

      <h3>Change Guardian Number</h3>
      <input type="tel" id="newGuardian">
      <input type="password" id="confirmPassword" placeholder="Enter Password to Confirm">
      <button onclick="updateGuardian()">Update</button>

      <button class="secondary" onclick="goDashboard()">Back</button>
    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
