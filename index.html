<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SignalShield</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

  <!-- AUTH SCREEN -->
  <div id="auth" class="screen active">
    <div class="auth-card">
      <h1>SignalShield</h1>
      <p>Premium IoT Safety System</p>

      <input type="text" id="name" placeholder="Full Name">
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">
      <input type="tel" id="guardian" placeholder="Guardian Phone Number">

      <button class="btn-primary" onclick="registerUser()">Register</button>
      <button class="btn-secondary" onclick="loginUser()">Login</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="screen">

    <div class="top-bar">
      <h2>Dashboard</h2>
      <div class="profile" onclick="openProfile()">👤</div>
    </div>

    <div class="status-card">
      <div id="statusLight" class="status-light"></div>
      <div id="statusTitle" class="status-title">Stick Not Connected</div>
      <div class="status-sub">Turn on Bluetooth to connect</div>
    </div>

    <button class="btn-primary" onclick="connectDevice()">Connect Stick</button>

    <div class="info-card">
      <h4>Guardian</h4>
      <p id="guardianDisplay"></p>
    </div>

    <div class="info-card">
      <h4>Last Alert</h4>
      <p id="lastAlert">No alerts sent</p>
    </div>

    <button class="sos-btn" onclick="manualSOS()">Manual SOS</button>

    <div class="activity">
      <h4>Activity</h4>
      <div id="activityList"></div>
    </div>

  </div>

  <!-- PROFILE -->
  <div id="profile" class="screen">
    <div class="auth-card">
      <h2>Profile</h2>
      <input type="tel" id="newGuardian" placeholder="New Guardian Number">
      <input type="password" id="confirmPass" placeholder="Enter Password">
      <button class="btn-primary" onclick="updateGuardian()">Update</button>
      <button class="btn-secondary" onclick="backDashboard()">Back</button>
    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
