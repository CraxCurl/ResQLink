<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResQLink</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- LOADING SCREEN -->
<div id="loadingScreen" class="screen active">
  <div class="logo">ResQLink</div>
  <div class="quote" id="quoteText">Empowering Every Step.</div>
  <div class="loader"></div>
</div>

<!-- AUTH SCREEN -->
<div id="authScreen" class="screen">
  <h1 class="brand">ResQLink</h1>

  <div class="features">
    <div class="feature">🛡 <strong>Real-Time Safety</strong><br><small>Instant protection when needed.</small></div>
    <div class="feature">📍 <strong>Location Tracking</strong><br><small>Accurate live positioning.</small></div>
    <div class="feature">🚨 <strong>Emergency SOS</strong><br><small>Immediate guardian alert.</small></div>
    <div class="feature">👥 <strong>Guardian Connect</strong><br><small>Stay linked to trusted contacts.</small></div>
  </div>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <input type="tel" id="guardian" placeholder="Guardian Phone (+91...)">

  <button id="registerBtn">Register</button>
  <button id="loginBtn" class="secondary">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="screen">
  <h2>Dashboard</h2>

  <div id="connectionStatus" class="status">
    Stick Not Connected
  </div>

  <div id="locationStatus">Fetching location...</div>

  <button id="sosBtn" class="danger">Manual SOS</button>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
