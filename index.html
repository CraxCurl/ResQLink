<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SignalShield</title>

<link rel="stylesheet" href="styles.css">
<link rel="manifest" href="manifest.json">
</head>

<body>

<div class="app">

  <!-- STATUS STRIP -->
  <div class="status-strip">
    <div class="status-item">
      <span id="btDot" class="dot red"></span>
      Bluetooth
    </div>

    <div class="status-item">
      <span id="gpsDot" class="dot red"></span>
      GPS
    </div>
  </div>

  <!-- SYSTEM PANEL -->
  <div id="systemPanel" class="system-panel armed">
    SYSTEM ARMED
  </div>

  <!-- HOLD BUTTON -->
  <div class="hold-container">
    <button id="holdBtn" class="hold-btn">
      Hold to Send SOS
      <div id="progressBar" class="progress-bar"></div>
    </button>
  </div>

  <!-- ACTIVITY PANEL -->
  <div class="activity-panel">
    <h4>Last Alert</h4>
    <p id="lastAlert">No alerts sent</p>
    <small id="deliveryStatus"></small>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
