<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SignalShield</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>

<body>

<div class="app">

    <div class="top-bar">
        <span id="statusDot"></span>
        <span id="statusText">Ready</span>
        <button class="settings-btn" onclick="openSettings()">⚙</button>
    </div>

    <div class="center">
        <button class="sos-btn"
                ontouchstart="holdStart()"
                ontouchend="holdEnd()">
            HOLD FOR SOS
        </button>
        <p class="hint">Hold for 2 seconds</p>
    </div>

</div>

<!-- Settings Modal -->
<div class="modal" id="settingsModal">
    <div class="modal-content">
        <h3>Emergency Contact</h3>
        <input type="tel" id="phoneInput" placeholder="Enter number">
        <button onclick="saveNumber()">Save</button>
        <button class="close" onclick="closeSettings()">Close</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
